version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: paceforge-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paceforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paceforge}
      POSTGRES_DB: ${POSTGRES_DB:-paceforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paceforge}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paceforge-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-paceforge}:${POSTGRES_PASSWORD:-paceforge}@db:5432/${POSTGRES_DB:-paceforge}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: paceforge-frontend
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
